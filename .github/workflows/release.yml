name: Release & Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: '版本升级类型 (patch: x.x.1, minor: x.1.0, major: 1.x.x)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    if: github.ref_name == 'main' || github.ref_name == 'dev'
    runs-on: ubuntu-latest

    env:
      BRANCH: ${{ github.ref_name }}
      BUMP_TYPE: ${{ github.event.inputs.bump }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: pnpm install

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      # ================== Main 分支专属：测试与覆盖率 ==================
      # 测试放在升版本之前，一旦不通过立即停止，防止发布带 Bug 的代码
      - name: Run Tests & Coverage (Main Only)
        if: env.BRANCH == 'main'
        run: pnpm coverage

      - name: Upload coverage to Coveralls (Main Only)
        if: env.BRANCH == 'main'
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ github.token }}
          path-to-lcov: coverage/lcov.info

      # ================== 核心：修改版本号与打 Tag ==================
      - name: Determine & Bump Version
        id: bump
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          if [ "$BRANCH" = "main" ]; then
            echo "当前在 main 分支：生成【正式版】"
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            npm version $BUMP_TYPE -m "chore(release): publish stable version v%s"

          elif [ "$BRANCH" = "dev" ]; then
            echo "当前在 dev 分支：生成【预览版】"
            echo "is_prerelease=true" >> $GITHUB_OUTPUT

            if [[ "$CURRENT_VERSION" == *"-beta"* && "$BUMP_TYPE" == "patch" ]]; then
              echo "检测到当前已是 beta 版本，仅递增预览尾号 (beta.x)..."
              npm version prerelease --preid=beta -m "chore(release): publish preview version v%s"
            else
              echo "生成全新的 beta 版本序列..."
              npm version pre${BUMP_TYPE} --preid=beta -m "chore(release): publish preview version v%s"
            fi
          fi

          echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      # ================== Main 分支专属：编译并发布文档 ==================
      - name: Build & Deploy Docs (Main Only)
        if: env.BRANCH == 'main'
        run: pnpm run docs:build

      - name: Deploy Docs to GitHub Pages (Main Only)
        if: env.BRANCH == 'main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/.vuepress/dist
          publish_branch: gh-pages
          commit_message: "docs: update documentation for v${{ steps.bump.outputs.VERSION }}"

      # ================== NPM 发布 ==================
      - name: Publish to NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          if [ "$BRANCH" = "main" ]; then
            echo "发布到 NPM Latest 标签..."
            npm publish
          else
            echo "发布到 NPM Beta 标签..."
            npm publish --tag beta
          fi

          git push origin $BRANCH
          git push origin --tags

      # ================== 创建 GitHub Release ==================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          target_commitish: ${{ env.BRANCH }}
          tag_name: v${{ steps.bump.outputs.VERSION }}
          name: ${{ steps.bump.outputs.is_prerelease == 'true' && 'Preview' || 'Release' }} v${{ steps.bump.outputs.VERSION }}
          prerelease: ${{ steps.bump.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
